<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BookMyShow</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar">
        <a href="../index.html" class="logo">Book<span>My</span>Show</a>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="movies.html">Movies</a>
        </div>
        <div class="nav-user" id="nav-user"></div>
    </nav>

    <div class="container" style="max-width: 450px; margin-top: 3rem;">
        <div class="card" style="border:none;">
            <div class="card-body" style="padding: 2rem;">
                <h2 style="text-align:center; margin-bottom: 1.5rem; color: var(--white);">Create Account 🎬</h2>
                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="phone" placeholder="9876543210">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Create a password" required>
                    </div>
                    <div class="form-group">
                        <label>State</label>
                        <select id="state-drop-down" required>
                            <option value="--Select State--">--Select State--</option>
                            <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
                            <option value="Andhra Pradesh">Andhra Pradesh</option>
                            <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                            <option value="Assam">Assam</option>
                            <option value="Bihar">Bihar</option>
                            <option value="Chandigarh">Chandigarh</option>
                            <option value="Chhattisgarh">Chhattisgarh</option>
                            <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and Diu</option>
                            <option value="Delhi">Delhi</option>
                            <option value="Goa">Goa</option>
                            <option value="Gujarat">Gujarat</option>
                            <option value="Haryana">Haryana</option>
                            <option value="Himachal Pradesh">Himachal Pradesh</option>
                            <option value="Jammu and Kashmir">Jammu and Kashmir</option>
                            <option value="Jharkhand">Jharkhand</option>
                            <option value="Karnataka">Karnataka</option>
                            <option value="Kerala">Kerala</option>
                            <option value="Ladakh">Ladakh</option>
                            <option value="Lakshadweep">Lakshadweep</option>
                            <option value="Madhya Pradesh">Madhya Pradesh</option>
                            <option value="Maharashtra">Maharashtra</option>
                            <option value="Manipur">Manipur</option>
                            <option value="Meghalaya">Meghalaya</option>
                            <option value="Mizoram">Mizoram</option>
                            <option value="Nagaland">Nagaland</option>
                            <option value="Odisha">Odisha</option>
                            <option value="Puducherry">Puducherry</option>
                            <option value="Punjab">Punjab</option>
                            <option value="Rajasthan">Rajasthan</option>
                            <option value="Sikkim">Sikkim</option>
                            <option value="Tamil Nadu">Tamil Nadu</option>
                            <option value="Telangana">Telangana</option>
                            <option value="Tripura">Tripura</option>
                            <option value="Uttar Pradesh">Uttar Pradesh</option>
                            <option value="Uttarakhand">Uttarakhand</option>
                            <option value="West Bengal">West Bengal</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>City</label>
                        <select id="city-drop-down" required>
                            <option value="--Select City--">--Select City--</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" style="margin-top: 0.5rem;">Sign Up</button>
                </form>
                <p style="text-align: center; margin-top: 1rem; color: var(--text-muted); font-size: 0.9rem;">
                    Already have an account? <a href="login.html" style="color: var(--primary); font-weight:600;">Login</a>
                </p>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        const stateSelect = document.getElementById('state-drop-down');
        const citySelect = document.getElementById('city-drop-down');

        stateSelect.addEventListener('change', function() {
            const selectedState = this.value;
            citySelect.innerHTML = '<option value="--Select City--">--Select City--</option>';
            if (selectedState !== "--Select State--") {
                loadCities(selectedState);
            }
        });

        async function loadCities(stateName){
            try {
                const cities = await CityAPI.getByState(stateName);
                const opts = '<option value="--Select City--">--Select City--</option>' +
                    cities.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
                citySelect.innerHTML = opts;
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

         async function handleRegister(e) {
            e.preventDefault();
            try {
                if (stateSelect.value === "--Select State--") {
                    throw new Error('Please select a state');
                }

                if (!citySelect.value || citySelect.value === "--Select City--") {
                    throw new Error('Please select a city');
                }

                const data = {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    password: document.getElementById('password').value,
                    city: citySelect.value
                };

                const user = await UserAPI.register(data);

                setLoggedInUser(user);
                showToast('Account created successfully!', 'success');

                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 1000);

            } catch (err) {
                showToast(err.message, 'error');
            }
        }
    </script>
</body>
</html>
